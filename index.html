<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hacking Simulator Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #050505;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            text-align: center;
            padding: 15px;
            font-size: 1.5rem;
            font-weight: bold;
            text-transform: uppercase;
            border-bottom: 2px solid #00ff00;
            text-shadow: 0 0 10px #00ff00;
        }

        .dashboard {
            display: flex;
            flex: 1;
            padding: 10px;
            gap: 10px;
        }

        .panel {
            border: 1px solid #00ff00;
            background: rgba(0, 255, 0, 0.05);
            padding: 15px;
            flex: 1;
            display: flex;
            flex-direction: column;
            box-shadow: inset 0 0 10px rgba(0, 255, 0, 0.2);
        }

        .panel h2 {
            font-size: 1.2rem;
            margin-bottom: 10px;
            border-bottom: 1px dashed #00ff00;
            padding-bottom: 5px;
            color: #fff;
            text-shadow: 0 0 5px #00ff00;
        }

        .content-box {
            flex: 1;
            overflow-y: hidden;
            font-size: 0.9rem;
            line-height: 1.4;
            word-wrap: break-word;
        }

        /* Stats Panel */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .stat-item {
            text-align: center;
            padding: 15px;
            border: 1px solid #004400;
            background: #0a0a0a;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: #00ff00;
            text-shadow: 0 0 10px #00ff00;
            margin-top: 10px;
        }

        .warning {
            color: #ff0000;
            text-shadow: 0 0 5px #ff0000;
        }

        ::-webkit-scrollbar {
            width: 5px;
        }
        ::-webkit-scrollbar-thumb {
            background: #00ff00;
        }
    </style>
</head>
<body>

    <header>
        [ SYSTEM OVERRIDE ] // Global Threat Simulator
    </header>

    <div class="dashboard">
        <div class="panel">
            <h2>> Terminal_Output</h2>
            <div id="terminal" class="content-box"></div>
        </div>

        <div class="panel">
            <h2>> System_Metrics</h2>
            <div class="stats-grid">
                <div class="stat-item">
                    <div>Data Decrypted (TB)</div>
                    <div id="dataStat" class="stat-value">0</div>
                </div>
                <div class="stat-item">
                    <div>Passwords Cracked</div>
                    <div id="passStat" class="stat-value">0</div>
                </div>
                <div class="stat-item">
                    <div>Active Connections</div>
                    <div id="connStat" class="stat-value">1,024</div>
                </div>
                <div class="stat-item warning">
                    <div>Threat Level</div>
                    <div class="stat-value warning">CRITICAL</div>
                </div>
            </div>
        </div>

        <div class="panel">
            <h2>> Attack_Logs (Malware & Email)</h2>
            <div id="logs" class="content-box"></div>
        </div>
    </div>

    <script>
        // 1. Terminal Data Simulation
        const terminal = document.getElementById('terminal');
        const hexChars = '0123456789ABCDEF';
        
        function generateRandomCode() {
            let line = '';
            const types = [
                () => `Connecting to ${Math.floor(Math.random() * 255)}.${Math.floor(Math.random() * 255)}.${Math.floor(Math.random() * 255)}.${Math.floor(Math.random() * 255)}:80...`,
                () => `Bypassing firewall... [${Math.random() > 0.1 ? 'SUCCESS' : 'RETRYING'}]`,
                () => `Fetching data block 0x${Math.floor(Math.random() * 1000000).toString(16).toUpperCase()}...`,
                () => {
                    let hex = '';
                    for(let i=0; i<40; i++) hex += hexChars[Math.floor(Math.random() * 16)];
                    return hex;
                }
            ];
            
            const p = document.createElement('div');
            p.textContent = types[Math.floor(Math.random() * types.length)]();
            terminal.appendChild(p);
            
            if (terminal.childNodes.length > 50) {
                terminal.removeChild(terminal.firstChild);
            }
            terminal.scrollTop = terminal.scrollHeight;
        }

        setInterval(generateRandomCode, 50);

        // 2. Attack Logs (Emails & Malware)
        const logs = document.getElementById('logs');
        const attackTypes = [
            "Injecting Ransomware payload -> target_server_01",
            "Phishing Email sent to -> admin@corp.com",
            "DDoS Attack initiated -> Port 8080",
            "Malware deployed successfully -> C:\\Windows\\System32\\svchost.exe",
            "Spoofing MAC address...",
            "Sending trojan via attachment -> invoice_urgent.pdf",
            "Extracting user credentials..."
        ];

        function generateLogs() {
            const p = document.createElement('div');
            const isWarning = Math.random() > 0.8;
            
            p.textContent = `[${new Date().toLocaleTimeString()}] ${attackTypes[Math.floor(Math.random() * attackTypes.length)]}`;
            if (isWarning) p.style.color = "#ff0000";
            
            logs.appendChild(p);
            
            if (logs.childNodes.length > 30) {
                logs.removeChild(logs.firstChild);
            }
            logs.scrollTop = logs.scrollHeight;
        }

        setInterval(generateLogs, 800);

        // 3. Update Stats
        let dataDecrypted = 0;
        let passwordsCracked = 0;
        
        setInterval(() => {
            dataDecrypted += Math.random() * 5;
            passwordsCracked += Math.floor(Math.random() * 50);
            
            document.getElementById('dataStat').innerText = dataDecrypted.toFixed(2);
            document.getElementById('passStat').innerText = passwordsCracked.toLocaleString();
            document.getElementById('connStat').innerText = (Math.floor(Math.random() * 5000) + 1000).toLocaleString();
        }, 300);
    </script>
</body>
</html>
