<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Terminal Simulator</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

        body {
            background-color: #000;
            color: #00ff41;
            font-family: 'Share Tech Mono', monospace;
            margin: 0;
            padding: 10px;
            height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        /* CRT Effect */
        body::after {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
            background-size: 100% 2px;
            pointer-events: none;
            z-index: 10;
        }

        #terminal {
            flex-grow: 1;
            overflow-y: auto;
            padding-bottom: 20px;
            font-size: 14px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .cmd { color: #00e5ff; }
        .success { color: #00ff41; }
        .error { color: #ff003c; }
        .warning { color: #ffcc00; }

        /* Hidden input for mobile keyboard */
        #hiddenInput {
            position: absolute;
            opacity: 0;
            top: -1000px;
        }

        /* Cursor blinking */
        .cursor {
            display: inline-block;
            width: 8px;
            height: 15px;
            background-color: #00ff41;
            animation: blink 1s step-end infinite;
            vertical-align: middle;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* Mobile instruction */
        #mobile-hint {
            color: #555;
            text-align: center;
            font-size: 12px;
            padding: 10px;
            border-top: 1px solid #333;
        }
    </style>
</head>
<body onclick="focusInput()">

    <div id="terminal"></div>
    <span class="cursor" id="cursor"></span>

    <div id="mobile-hint">
        [ স্ক্রিনে ট্যাপ করে কীবোর্ড ওপেন করুন এবং যেকোনো কী (Key) চাপতে থাকুন ]
    </div>

    <input type="text" id="hiddenInput" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">

    <script>
        // কাল্পনিক হ্যাকিং কমান্ড এবং তার আউটপুট
        const sequence = [
            { cmd: "init_connection --target smtp.gmail.com --port 465", out: "[+] Connection established to target server.\n[+] Initiating SSL/TLS handshake... OK.", color: "success" },
            { cmd: "bypass_auth_gateway -level 4", out: "[!] Warning: High-level firewall detected.\n[!] Rerouting through proxy chains (Russia -> Panama -> Target)...\n[+] Firewall bypassed successfully.", color: "warning" },
            { cmd: "inject_payload --type sql_blind --user target@gmail.com", out: "[-] Exploit failed. Retrying with Zero-Day payload...\n[+] Payload injected into memory.", color: "error" },
            { cmd: "extract_hash --db main_users", out: "[+] Extracting data... 100%\n[+] Hash obtained: 0x8F9A2B4C9201F...\n[!] Commencing brute-force attack...", color: "success" },
            { cmd: "crack_hash --rainbow-table /usr/share/wordlists/rockyou.txt", out: "[!] Cracking... [||||||||||||||||||||] 100%\n[+] Password decrypted: *********", color: "success" },
            { cmd: "disable_2fa --spoof-token", out: "[!] Intercepting SMS gateway...\n[+] 2FA Token spoofed. Security layer breached.", color: "warning" },
            { cmd: "grant_root_access", out: "\n=========================================\n[+] ACCESS GRANTED. Welcome to the system.\n=========================================\n", color: "success" }
        ];

        let currentStep = 0;
        let currentCharIndex = 0;
        let isTyping = false;
        let isOutputting = false;

        const terminal = document.getElementById('terminal');
        const hiddenInput = document.getElementById('hiddenInput');
        const cursor = document.getElementById('cursor');

        // স্ক্রিনে চাপ দিলে কীবোর্ড ওপেন হবে
        function focusInput() {
            hiddenInput.focus();
        }

        // টাইপ করা টেক্সট টার্মিনালে দেখানো
        function appendText(text, className = '') {
            let span = document.createElement('span');
            if (className) span.className = className;
            span.innerHTML = text.replace(/\n/g, '<br>');
            terminal.appendChild(span);
            scrollToBottom();
        }

        function scrollToBottom() {
            window.scrollTo(0, document.body.scrollHeight);
        }

        // কীবোর্ড ইনপুট হ্যান্ডলার
        hiddenInput.addEventListener('input', (e) => {
            e.preventDefault();
            hiddenInput.value = ""; // ফিল্ড খালি রাখা
            
            if (isOutputting || currentStep >= sequence.length) return;

            const step = sequence[currentStep];

            if (!isTyping) {
                appendText("root@kali:~# ", "cmd");
                isTyping = true;
            }

            // ব্যবহারকারী যেকোনো কী চাপলে আমরা আসল কমান্ডের ৩টি করে অক্ষর প্রিন্ট করব (দ্রুত টাইপ দেখানোর জন্য)
            const charsToType = 3; 
            const textToInsert = step.cmd.substring(currentCharIndex, currentCharIndex + charsToType);
            
            appendText(textToInsert);
            currentCharIndex += charsToType;

            // কমান্ড টাইপ করা শেষ হলে
            if (currentCharIndex >= step.cmd.length) {
                isOutputting = true;
                appendText("<br>");
                
                // একটু সময় নিয়ে আউটপুট দেখানো
                setTimeout(() => {
                    appendText(step.out + "<br><br>", step.color);
                    currentStep++;
                    currentCharIndex = 0;
                    isTyping = false;
                    isOutputting = false;
                    
                    if(currentStep >= sequence.length) {
                        document.getElementById('mobile-hint').innerText = "[ হ্যাকিং সিমুলেশন সম্পন্ন হয়েছে ]";
                    }
                }, 800);
            }
        });

        // পিসির কীবোর্ডের জন্য
        document.addEventListener('keydown', () => {
            hiddenInput.focus();
        });
        
        window.onload = focusInput;
    </script>
</body>
</html>
